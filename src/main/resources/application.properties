spring.application.name=cinema

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:mydb}
spring.datasource.username=${POSTGRES_USER:user}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

cinema.session.break-time=15

cinema.jwt.secret=${JWT_SECRET:6N2ueeeAJSDsJkBz2MQHUY16WdoBmLrWCEhADwmteOG}
cinema.jwt.expiration=1800000


springdoc.swagger-ui.disable-swagger-default-url=true
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packagesToScan=kg.manasuniversity.cinema

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

cinema.refresh-cookie.name=refresh_token
cinema.refresh-cookie.max-age=604800
cinema.refresh-cookie.secure=false
cinema.refresh-cookie.same-site=Lax
